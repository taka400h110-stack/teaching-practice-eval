name: Nightly UI Audit Optional

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-ui-audit-optional
  cancel-in-progress: true

env:
  CI: true
  TZ: UTC
  LANG: ja_JP.UTF-8
  LC_ALL: ja_JP.UTF-8

jobs:
  audit-optional-nightly:
    name: audit-optional-nightly
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - stats-malformed
          - mobile
          - provider-health

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locale and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y locales fonts-noto-cjk
          sudo locale-gen ja_JP.UTF-8 || true

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run nightly optional audit
        run: |
          if [ "${{ matrix.target }}" = "stats-malformed" ]; then
            npm run test:e2e:optional:stats-malformed
          elif [ "${{ matrix.target }}" = "mobile" ]; then
            npm run test:e2e:optional:mobile
          elif [ "${{ matrix.target }}" = "provider-health" ]; then
            npm run test:e2e:optional:provider-health
          else
            echo "Unknown matrix target: ${{ matrix.target }}"
            exit 1
          fi
        env:
          PLAYWRIGHT_JOBS_LAYER: optional-nightly

      - name: Upload nightly optional audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-optional-${{ matrix.target }}-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
